<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 4</title>
    <style>
        table { border-collapse: collapse; margin-top: 25px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        td { width: 35px; height: 35px; border: 1px solid #ccc; }
        .color-pink { background-color: #ff99cc; }
        .color-navy { background-color: #000080; }
    </style>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Завдання 4 (Генерація матриці - Варіант 2)</h2>
    <a href="index.html">🔙 Повернутися до списку завдань</a><br><br>
    <script>
        let size = 10;
        document.write("<table>");
        for (let i = 1; i <= size; i++) {
            document.write("<tr>");
            for (let j = 1; j <= size; j++) {
                // Логіка шахівниці: якщо сума координат парна — рожевий колір, інакше — темно-синій
                let styleClass = ((i + j) % 2 === 0) ? "class='color-pink'" : "class='color-navy'";
                document.write("<td " + styleClass + "></td>");
            }
            document.write("</tr>");
        }
        document.write("</table>");
    </script>
</body>
</html>
